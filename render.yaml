# Blueprint Render.com — chỉ deploy Web Service (Docker)
# Database dùng bên ngoài (khuyên dùng Neon — free, không bị sleep như Web Service)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ong-gio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Dán connection string từ Neon/ElephantSQL vào Render Dashboard sau khi deploy
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: JwtSettings__SecretKey
        generateValue: true
